kind = "web"
previewPath = "/"
title = "KialaBet"
version = "1.0.0"
id = "artifacts/kiala-bet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22987

[services.development]
run = "pnpm --filter @workspace/kiala-bet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kiala-bet", "run", "build" ]
publicDir = "artifacts/kiala-bet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22987"
BASE_PATH = "/"
